openapi: 3.0.0
info:
  title: Payment Service API
  description: Local API documentation for the Payment microservice.
  version: 1.0.0
servers:
  - url: http://localhost:5005
    description: Standalone Payment Service Server
  - url: http://localhost:8000/api
    description: API Gateway Server

paths:
  /payments/initiate:
    post:
      tags: [Payment Service]
      summary: Initiate a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: string }
                orderId: { type: string }
                amount: { type: number }
      responses:
        '201': { description: Payment initiated }

  /payments/confirm:
    post:
      tags: [Payment Service]
      summary: Confirm a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentId: { type: string }
      responses:
        '200': { description: Payment confirmed }

  /payments/cancel:
    post:
      tags: [Payment Service]
      summary: Cancel a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentId: { type: string }
      responses:
        '200': { description: Payment cancelled }

  /payments/refund:
    post:
      tags: [Payment Service]
      summary: Refund a payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentId: { type: string }
      responses:
        '200': { description: Payment refunded }

  /payments/webhook:
    post:
      tags: [Payment Service]
      summary: Payment webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentId: { type: string }
                status: { type: string }
      responses:
        '200': { description: Webhook processed }

  /payments/{paymentId}:
    get:
      tags: [Payment Service]
      summary: Get payment by ID
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Successful operation }

  /payments/order/{orderId}:
    get:
      tags: [Payment Service]
      summary: Get payments by order ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Successful operation }

  /payments/user/{userId}:
    get:
      tags: [Payment Service]
      summary: Get payments by user ID
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Successful operation }

  /payments/status/{paymentId}:
    get:
      tags: [Payment Service]
      summary: Get payment status by payment ID
      parameters:
        - name: paymentId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200': { description: Successful operation }
