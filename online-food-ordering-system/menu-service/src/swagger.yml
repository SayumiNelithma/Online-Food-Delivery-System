openapi: 3.0.0
info:
  title: Menu Service API
  description: Local API documentation for the Menu microservice.
  version: 1.0.0
servers:
  - url: http://localhost:5003
    description: Standalone Menu Service Server
  - url: http://localhost:8000/api
    description: API Gateway Server

paths:
  /menus:
    get:
      tags:
        - Menu Service
      summary: Get all menus
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Menu Service
      summary: Create a new menu item
      responses:
        '201':
          description: Created
  /menus/{id}:
    get:
      tags:
        - Menu Service
      summary: Get a menu item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags:
        - Menu Service
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Menu Service
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /menus/restaurant/{restaurantId}:
    get:
      tags:
        - Menu Service
      summary: Get all menu items for a restaurant
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Menu Service
      summary: Delete all menu items for a restaurant
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /menus/{id}/availability:
    put:
      tags:
        - Menu Service
      summary: Update menu item availability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                availability:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Successful operation
