openapi: 3.0.0
info:
  title: Online Food Delivery System API Gateway
  description: API Gateway combining documentation for all microservices in the system.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local API Gateway Server

paths:
  # --------------------------------------------------------------------------------
  # Customer Service
  # --------------------------------------------------------------------------------
  /api/customers:
    get:
      tags:
        - Customer Service
      summary: Get all customers
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Customer Service
      summary: Create a new customer
      responses:
        '201':
          description: Created
  /api/customers/{id}:
    put:
      tags:
        - Customer Service
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Customer Service
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

