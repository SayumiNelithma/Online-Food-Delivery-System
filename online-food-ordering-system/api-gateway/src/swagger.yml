      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/deliveries/order/{orderId}:
    get:
      tags:
        - Delivery Service
      summary: Get delivery by order ID
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/deliveries/rider/{riderName}:
    get:
      tags:
        - Delivery Service
      summary: Get deliveries by rider name
      parameters:
        - name: riderName
          in: path
          required: true
          schema:
            type: string
