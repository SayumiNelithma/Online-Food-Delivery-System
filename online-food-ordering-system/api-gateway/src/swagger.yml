openapi: 3.0.0
info:
  title: Online Food Delivery System API Gateway
  description: API Gateway combining documentation for all microservices in the system.
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local API Gateway Server

paths:
  # --------------------------------------------------------------------------------
  # Customer Service
  # --------------------------------------------------------------------------------
  /api/customers:
    get:
      tags:
        - Customer Service
      summary: Get all customers
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Customer Service
      summary: Create a new customer
      responses:
        '201':
          description: Created
  /api/customers/{id}:
    get:
      tags:
        - Customer Service
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags:
        - Customer Service
      summary: Update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Customer Service
      summary: Delete a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /api/customers/{id}/orders:
    get:
      tags:
        - Customer Service
      summary: Get all orders by customer ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/customers/{id}/payments:
    get:
      tags:
        - Customer Service
      summary: Get all payments by customer ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # --------------------------------------------------------------------------------
  # Restaurant Service
  # --------------------------------------------------------------------------------
  /api/restaurants:
    get:
      tags:
        - Restaurant Service
      summary: Get all restaurants
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Restaurant Service
      summary: Create a new restaurant
      responses:
        '201':
          description: Created
  /api/restaurants/{id}:
    get:
      tags:
        - Restaurant Service
      summary: Get a restaurant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags:
        - Restaurant Service
      summary: Update a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Restaurant Service
      summary: Delete a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /api/restaurants/{id}/menus:
    get:
      tags:
        - Restaurant Service
      summary: Get all menus for a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/restaurants/{id}/status:
    put:
      tags:
        - Restaurant Service
      summary: Update restaurant operational status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "CLOSED"
      responses:
        '200':
          description: Successful operation

  # --------------------------------------------------------------------------------
  # Menu Service
  # --------------------------------------------------------------------------------
  /api/menus:
    get:
      tags:
        - Menu Service
      summary: Get all menus
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Menu Service
      summary: Create a new menu item
      responses:
        '201':
          description: Created
  /api/menus/{id}:
    get:
      tags:
        - Menu Service
      summary: Get a menu item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags:
        - Menu Service
      summary: Update a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Menu Service
      summary: Delete a menu item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  /api/menus/restaurant/{restaurantId}:
    get:
      tags:
        - Menu Service
      summary: Get all menu items for a restaurant
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Menu Service
      summary: Delete all menu items for a restaurant
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/menus/{id}/availability:
    put:
      tags:
        - Menu Service
      summary: Update menu item availability
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                availability:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Successful operation

  # --------------------------------------------------------------------------------
  # Order Service
  # --------------------------------------------------------------------------------
  /api/orders:
    get:
      tags:
        - Order Service
      summary: Get all orders
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Order Service
      summary: Create a new order
      responses:
        '201':
          description: Created
  /api/orders/{id}:
    get:
      tags:
        - Order Service
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags:
        - Order Service
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Order Service
      summary: Delete an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/orders/user/{userId}:
    get:
      tags:
        - Order Service
      summary: Get orders by user ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/orders/restaurant/{restaurant_id}:
    get:
      tags:
        - Order Service
      summary: Get orders by restaurant ID
      parameters:
        - name: restaurant_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/orders/{id}/status:
    put:
      tags:
        - Order Service
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: "DELIVERED"
      responses:
        '200':
          description: Successful operation
  /api/orders/{id}/payments:
    get:
      tags:
        - Order Service
      summary: Get payments for an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/orders/{id}/cancel:
    put:
      tags:
        - Order Service
      summary: Cancel an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
  /api/orders/{id}/refund:
    post:
      tags:
        - Order Service
      summary: Refund an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # --------------------------------------------------------------------------------
  # Payment Service
  # --------------------------------------------------------------------------------
  /api/payments:
    get:
      tags:
        - Payment Service
      summary: Get all payments
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Payment Service
      summary: Process a new payment
      responses:
        '201':
          description: Created
  /api/payments/{id}:
    get:
      tags:
        - Payment Service
      summary: Get a payment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    put:
      tags:
        - Payment Service
      summary: Update a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
    delete:
      tags:
        - Payment Service
      summary: Delete a payment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation

  # --------------------------------------------------------------------------------
  # Delivery Service
  # --------------------------------------------------------------------------------
  /api/deliveries:
    get:
      tags:
        - Delivery Service
      summary: Get all deliveries
      responses:
        '200':
          description: Successful operation
    post:
      tags:
        - Delivery Service
      summary: Create a new delivery
      responses:
        '201':
          description: Created
  /api/deliveries/{id}:
    get:
      tags:
